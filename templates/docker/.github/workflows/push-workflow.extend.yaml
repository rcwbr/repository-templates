jobs:
  build-docker-images:
    name: Build Docker images
    runs-on: ubuntu-24.04
    permissions:
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4.1.7
      -
        # TODO remove after more satisfactory options exist to use latest Docker
        # version while avoiding this issue: https://github.com/docker/buildx/issues/59
        name: Set up Docker
        uses: docker/setup-docker-action@v4
        with:
          version: 27.3.1
          daemon-config: |
            {
              "features": {
                "containerd-snapshotter": true
              }
            }
      - name: GHCR Login
        uses: docker/login-action@v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      -
        name: Docker Buildx builder setup
        uses: docker/setup-buildx-action@v3.11.1
        with:
          version: v0.19.1
      -
        id: docker-bake-NEW_PROJECT
        name: Docker Bake NEW_PROJECT
        uses: docker/bake-action@v7.3.0
        with:
          source: https://github.com/rcwbr/dockerfile-partials.git#0.13.0
          files: github-cache-bake.hcl, cwd://docker-bake.hcl
          targets: NEW_PROJECT
        env:
          REGISTRY: ghcr.io/NEW_ORG/
          IMAGE_NAME: NEW_PROJECT
    outputs:
      NEW_PROJECT: ${{ steps.docker-bake-NEW_PROJECT.outputs.metadata }}
  dive-efficiency:
    name: Dive Docker image space efficiency analysis
    needs: build-docker-images
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5.0.0
      - name: GHCR Login
        uses: docker/login-action@v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Dive JSON
        run: |
          docker run \
            --rm \
            -e CI=true \
            -v $(pwd)/.dive-ci:/etc/.dive-ci \
            -v $(pwd)/out:/out \
            -v /var/run/docker.sock:/var/run/docker.sock \
            wagoodman/dive:v0.13.1 \
            --ci-config /etc/.dive-ci \
            ${{ format(
              '{0}{1}',
              (github.ref_name == github.event.repository.default_branch && '--json /out/dive.json ' || ''),
              fromJSON(needs.build-docker-images.outputs.NEW_PROJECT).NEW_PROJECT['image.name']
            ) }}
      - name: Upload Dive result
        if: github.ref_name == github.event.repository.default_branch
        uses: actions/upload-artifact@v5.0.0
        with:
          name: dive_results
          path: out/dive.json
  # Overrides to include dive-efficiency info in release
  release-it-workflow:
    needs: dive-efficiency
    with:
      artifact-name: ${{ format('refs/heads/{0}', github.event.repository.default_branch) == github.ref && 'dive_results' || '' }}
